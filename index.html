<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>职业档案局</title>
<style>
/* ===== RESET & BASE ===== */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --kokutan: #0d0a06;       /* 黒橡 */
  --kokutan-light: #1a1208; /* 卡面 */
  --kokutan-mid: #241a0c;   /* 边框亮 */
  --shironeri: #ede8dc;     /* 白練 */
  --shironeri-dim: #a09070; /* 白練·暗 */
  --shironeri-ghost: #4a4030; /* 白練·极暗 */
  --shu: #c03020;           /* 朱 */
  --shu-dim: #6a1a10;       /* 朱·暗 */
  --shu-glow: rgba(192,48,32,0.15);
}

body {
  background: var(--kokutan);
  color: var(--shironeri);
  font-family: 'Songti SC', 'Noto Serif SC', 'Noto Serif CJK SC', 'STSong', 'SimSun', Georgia, serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== SCREENS ===== */
.screen { display: none; position: relative; }
.screen.active { display: flex; flex-direction: column; min-height: 100vh; }

/* ===== INTRO SCREEN ===== */
#intro-screen {
  justify-content: flex-end;
  padding: 0 0 60px;
}

.intro-bg {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 50vh;
  background: linear-gradient(to bottom, #1a0a04, var(--kokutan));
  z-index: 0;
}

.intro-content {
  position: relative;
  z-index: 1;
  padding: 0 28px;
}

.game-badge {
  font-size: 10px;
  letter-spacing: 4px;
  color: var(--shu);
  margin-bottom: 20px;
  opacity: 0.8;
}

.game-title {
  font-size: 32px;
  letter-spacing: 10px;
  color: var(--shironeri);
  margin-bottom: 8px;
  line-height: 1.2;
}

.game-subtitle {
  font-size: 11px;
  color: var(--shironeri-dim);
  letter-spacing: 2px;
  margin-bottom: 36px;
}

.intro-divider {
  width: 40px;
  height: 1px;
  background: var(--shu-dim);
  margin-bottom: 28px;
}

.intro-body {
  font-size: 14px;
  line-height: 2.2;
  color: var(--shironeri-dim);
  margin-bottom: 40px;
}

.intro-body strong {
  color: var(--shironeri);
  font-weight: normal;
}

.intro-body .data-point {
  color: var(--shu);
  font-size: 22px;
  display: block;
  margin: 8px 0 12px;
  letter-spacing: 2px;
}

.intro-body .ellipsis {
  color: var(--shironeri-ghost);
  display: block;
  margin-top: 8px;
  letter-spacing: 6px;
}

.input-label {
  font-size: 10px;
  color: var(--shironeri-ghost);
  letter-spacing: 3px;
  margin-bottom: 10px;
}

.job-input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--shironeri-ghost);
  color: var(--shironeri);
  font-family: inherit;
  font-size: 20px;
  letter-spacing: 2px;
  padding: 8px 0 12px;
  outline: none;
  margin-bottom: 32px;
  border-radius: 0;
}
.job-input::placeholder { color: var(--shironeri-ghost); font-size: 14px; letter-spacing: 1px; }
.job-input:focus { border-bottom-color: var(--shironeri-dim); }

.start-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 18px 24px;
  background: var(--shu);
  border: none;
  color: var(--shironeri);
  font-family: inherit;
  font-size: 14px;
  letter-spacing: 4px;
  cursor: pointer;
  border-radius: 2px;
}
.start-btn .arrow { font-size: 18px; }
.start-btn:active { background: #a02818; }

/* ===== GAME SCREEN ===== */
#game-screen {
  justify-content: space-between;
}

/* HUD */
.game-hud {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 24px 12px;
  border-bottom: 1px solid #1a1208;
}

.hud-year {
  font-size: 24px;
  color: var(--shironeri);
  letter-spacing: 6px;
}

.hud-right {
  text-align: right;
}

.hud-count {
  font-size: 10px;
  color: var(--shironeri-ghost);
  letter-spacing: 2px;
  display: block;
  margin-bottom: 4px;
}

.hud-dots {
  display: flex;
  gap: 4px;
  justify-content: flex-end;
}

.hud-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--shironeri-ghost);
}
.hud-dot.done { background: var(--shu); }
.hud-dot.current { background: var(--shironeri-dim); }

/* EVENT AREA */
.event-area {
  padding: 20px 24px 16px;
  flex: 1;
  overflow-y: auto;
}

.event-year-label {
  font-size: 10px;
  color: var(--shu);
  letter-spacing: 4px;
  margin-bottom: 10px;
  opacity: 0.8;
}

.event-text {
  font-size: 13px;
  line-height: 2;
  color: var(--shironeri-dim);
  min-height: 60px;
}

.event-slogan {
  font-size: 11px;
  color: var(--shironeri-ghost);
  letter-spacing: 4px;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid #1a1208;
}

/* DRAW AREA */
.draw-area {
  padding: 16px 24px;
}

.draw-label {
  font-size: 10px;
  color: var(--shironeri-ghost);
  letter-spacing: 3px;
  margin-bottom: 12px;
}

.draw-slots {
  display: flex;
  gap: 8px;
  margin-bottom: 6px;
}

.draw-slot {
  flex: 1;
  aspect-ratio: 2/3;
  border: 1px solid var(--shironeri-ghost);
  border-radius: 4px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s;
  background: var(--kokutan-light);
}

.draw-slot.face-down {
  display: flex;
  align-items: center;
  justify-content: center;
}

.draw-slot.face-down::after {
  content: '◆';
  color: #1a1208;
  font-size: 16px;
}

.draw-slot.face-up {
  border-color: var(--shironeri-ghost);
}

.draw-slot.face-up:active,
.draw-slot.face-up:hover {
  border-color: var(--shironeri-dim);
}

.draw-slot.selected {
  border-color: var(--shu) !important;
  box-shadow: 0 0 8px var(--shu-glow);
}

.slot-rarity {
  position: absolute;
  top: 4px;
  right: 4px;
  font-size: 8px;
  padding: 1px 3px;
  border-radius: 2px;
}

.slot-name {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 3px 4px 4px;
  font-size: 9px;
  line-height: 1.3;
  color: var(--shironeri-dim);
  text-align: center;
  background: linear-gradient(to top, var(--kokutan-light), transparent);
}

.slot-resist {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -60%);
  font-size: 18px;
  color: var(--shironeri-ghost);
}

/* Rarity colors */
.r-N { background: #1a1a18; color: #555550; border: 1px solid #2a2a28; }
.r-R { background: #0a1020; color: #4060a0; border: 1px solid #1a2840; }
.r-SR { background: #100a20; color: #7050a0; border: 1px solid #280a40; }
.r-SSR { background: #181200; color: #a08020; border: 1px solid #403000; }
.r-UR { background: #180808; color: #c03020; border: 1px solid #4a1010; }

/* CURRENT CARD */
.current-area {
  padding: 0 24px 32px;
}

.current-label {
  font-size: 10px;
  color: var(--shironeri-ghost);
  letter-spacing: 3px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.back-to-own-link {
  font-size: 10px;
  color: var(--shu-dim);
  cursor: pointer;
  letter-spacing: 1px;
  border: none;
  background: none;
  font-family: inherit;
  padding: 0;
}
.back-to-own-link:active { color: var(--shu); }

.current-card {
  background: var(--kokutan-light);
  border: 1px solid var(--shironeri-ghost);
  border-radius: 6px;
  padding: 16px 18px;
  position: relative;
}

.current-card.own-card {
  border-color: var(--shu-dim);
}

.cc-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 10px;
}

.cc-name {
  font-size: 22px;
  color: var(--shironeri);
  letter-spacing: 2px;
}

.cc-own-tag {
  font-size: 9px;
  color: var(--shu);
  letter-spacing: 2px;
  margin-top: 2px;
}

.cc-right {
  text-align: right;
}

.cc-resist-label { font-size: 9px; color: var(--shironeri-ghost); letter-spacing: 1px; }
.cc-resist-val { font-size: 28px; color: var(--shironeri-dim); }

.cc-desc {
  font-size: 12px;
  line-height: 1.8;
  color: var(--shironeri-ghost);
  margin-bottom: 14px;
}

.action-btn {
  width: 100%;
  padding: 14px;
  border: 1px solid var(--shironeri-ghost);
  background: transparent;
  color: var(--shironeri-dim);
  font-family: inherit;
  font-size: 12px;
  letter-spacing: 3px;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
  text-align: center;
}
.action-btn:active { border-color: var(--shironeri-dim); color: var(--shironeri); }
.action-btn.primary {
  background: var(--shu);
  border-color: var(--shu);
  color: var(--shironeri);
}
.action-btn.primary:active { background: #a02818; }

/* ===== CARD MODAL ===== */
#card-modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(13,10,6,0.92);
  align-items: flex-end;
  justify-content: center;
  padding: 0;
}
#card-modal.open { display: flex; }

.modal-backdrop {
  position: absolute;
  inset: 0;
}

.modal-card {
  position: relative;
  width: 100%;
  max-width: 480px;
  background: var(--kokutan-light);
  border-top: 1px solid var(--shironeri-ghost);
  border-radius: 12px 12px 0 0;
  padding: 32px 28px 48px;
  animation: slideUp 0.3s ease;
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.modal-close {
  position: absolute;
  top: 16px;
  right: 20px;
  background: none;
  border: none;
  color: var(--shironeri-ghost);
  font-size: 20px;
  cursor: pointer;
  padding: 4px;
  font-family: inherit;
}

.modal-rarity-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
}

.modal-rarity {
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 2px;
}

.modal-category {
  font-size: 10px;
  color: var(--shironeri-ghost);
  letter-spacing: 2px;
}

.modal-name {
  font-size: 28px;
  color: var(--shironeri);
  letter-spacing: 4px;
  margin-bottom: 8px;
}

.modal-resist-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 20px;
}

.modal-resist-num {
  font-size: 42px;
  color: var(--shironeri-dim);
  line-height: 1;
}

.modal-resist-label {
  font-size: 11px;
  color: var(--shironeri-ghost);
  letter-spacing: 1px;
}

.modal-divider {
  height: 1px;
  background: #1a1208;
  margin-bottom: 20px;
}

.modal-desc {
  font-size: 14px;
  line-height: 2.2;
  color: var(--shironeri-dim);
  margin-bottom: 28px;
}

.modal-swap-btn {
  width: 100%;
  padding: 16px;
  background: var(--shu);
  border: none;
  color: var(--shironeri);
  font-family: inherit;
  font-size: 13px;
  letter-spacing: 4px;
  cursor: pointer;
  border-radius: 2px;
}
.modal-swap-btn:active { background: #a02818; }
.modal-swap-btn:disabled {
  background: var(--shironeri-ghost);
  color: var(--kokutan-light);
  cursor: default;
}

/* ===== ELIM SCREEN ===== */
#elim-screen {
  padding: 0;
}

.elim-header {
  padding: 40px 28px 24px;
  border-bottom: 1px solid #1a1208;
}

.elim-year {
  font-size: 40px;
  color: var(--shironeri);
  letter-spacing: 8px;
  margin-bottom: 4px;
}

.elim-subtitle {
  font-size: 11px;
  color: var(--shironeri-ghost);
  letter-spacing: 3px;
}

.elim-list {
  padding: 24px 28px;
  flex: 1;
}

.elim-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid #1a1208;
  opacity: 0;
  transform: translateX(-8px);
  transition: all 0.3s;
}

.elim-item.visible {
  opacity: 1;
  transform: translateX(0);
}

.elim-item.mine {
  padding: 14px 0;
}

.elim-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--shironeri-ghost);
  flex-shrink: 0;
}

.elim-item.mine .elim-dot {
  background: var(--shu);
  width: 8px;
  height: 8px;
}

.elim-job { font-size: 16px; color: var(--shironeri-dim); }
.elim-item.mine .elim-job { color: var(--shu); font-size: 18px; }
.elim-tag { font-size: 10px; color: var(--shu-dim); letter-spacing: 1px; margin-left: auto; }

.verdict-area {
  padding: 0 28px 40px;
}

.verdict-box {
  padding: 24px;
  border: 1px solid var(--shironeri-ghost);
  border-radius: 4px;
  text-align: center;
  margin-bottom: 20px;
}

.verdict-box.survived { border-color: #2a4a2a; background: #060d06; }
.verdict-box.failed { border-color: var(--shu-dim); background: #0d0606; }

.verdict-status { font-size: 12px; letter-spacing: 4px; margin-bottom: 8px; }
.survived .verdict-status { color: #50a050; }
.failed .verdict-status { color: var(--shu); }
.verdict-msg { font-size: 13px; color: var(--shironeri-ghost); line-height: 1.8; }

/* ===== FAIL SCREEN ===== */
#fail-screen {
  padding: 0;
  justify-content: flex-end;
}

.fail-content {
  padding: 40px 28px 60px;
}

.fail-year-big {
  font-size: 56px;
  color: var(--shu);
  letter-spacing: 8px;
  opacity: 0.6;
  margin-bottom: 4px;
}

.fail-title { font-size: 20px; color: var(--shironeri); letter-spacing: 4px; margin-bottom: 24px; }

.fail-text {
  font-size: 13px;
  line-height: 2.2;
  color: var(--shironeri-ghost);
  margin-bottom: 40px;
  padding: 20px;
  border: 1px solid #1a1208;
  background: #0a0806;
  border-radius: 4px;
}

.fail-btns { display: flex; flex-direction: column; gap: 10px; }

/* ===== ENDING SCREEN ===== */
#ending-screen {
  padding: 0;
  justify-content: flex-end;
}

.ending-content {
  padding: 40px 28px 60px;
}

.ending-label {
  font-size: 10px;
  color: var(--shu);
  letter-spacing: 4px;
  margin-bottom: 16px;
}

.ending-title {
  font-size: 28px;
  color: var(--shironeri);
  letter-spacing: 4px;
  margin-bottom: 32px;
  line-height: 1.4;
}

.ending-text {
  font-size: 14px;
  line-height: 2.4;
  color: var(--shironeri-dim);
  margin-bottom: 40px;
}

.ending-text p { margin-bottom: 20px; }
.ending-text .highlight { color: var(--shironeri); }
</style>
</head>
<body>

<!-- ===== INTRO ===== -->
<div id="intro-screen" class="screen active">
  <div class="intro-bg"></div>
  <div class="intro-content">
    <div class="game-badge">ANTHROPIC RESEARCH × 2026</div>
    <div class="game-title">职业档案局</div>
    <div class="game-subtitle">BUREAU OF PROFESSIONAL RECORDS</div>
    <div class="intro-divider"></div>
    <div class="intro-body">
      2026年，Anthropic发布研究报告：
      <span class="data-point">67%</span>
      的职业面临AI替代风险。<strong>这不是预测，是时间表。</strong>
      <span class="ellipsis">…</span>
      从这一年开始，每年都有职业从世界上消失。<br>你的职业，在名单上吗？
    </div>
    <div class="input-label">填入你现在的职业</div>
    <input class="job-input" id="job-input" type="text" placeholder="编导、程序员、设计师……" maxlength="12" autocomplete="off">
    <button class="start-btn" id="start-btn">
      <span>开始翻阅档案</span>
      <span class="arrow">→</span>
    </button>
  </div>
</div>

<!-- ===== GAME ===== -->
<div id="game-screen" class="screen">
  <!-- HUD -->
  <div class="game-hud">
    <div class="hud-year" id="hud-year">2026</div>
    <div class="hud-right">
      <span class="hud-count" id="hud-count">第 1 年 / 共 10 年</span>
      <div class="hud-dots" id="hud-dots"></div>
    </div>
  </div>

  <!-- Event -->
  <div class="event-area">
    <div class="event-year-label" id="ev-year-label">2026 · 大事记</div>
    <div class="event-text" id="ev-text">加载中…</div>
    <div class="event-slogan" id="ev-slogan"></div>
  </div>

  <!-- Draw -->
  <div class="draw-area">
    <div class="draw-label">本年抽取职业 · 点击查看详情</div>
    <div class="draw-slots" id="draw-slots"></div>
  </div>

  <!-- Current Card -->
  <div class="current-area">
    <div class="current-label">
      <span>当前持有职业</span>
      <button class="back-to-own-link" id="back-own-btn" style="display:none">换回本职 →</button>
    </div>
    <div class="current-card" id="current-card">
      <div class="cc-top">
        <div>
          <div class="cc-name" id="cc-name">—</div>
          <div class="cc-own-tag" id="cc-own-tag" style="display:none">本职</div>
        </div>
        <div class="cc-right">
          <div class="cc-resist-label">抗AI值</div>
          <div class="cc-resist-val" id="cc-resist">—</div>
        </div>
      </div>
      <div class="cc-desc" id="cc-desc"></div>
      <button class="action-btn primary" id="keep-btn">保留当前职业，进入事件</button>
    </div>
  </div>
</div>

<!-- ===== CARD MODAL ===== -->
<div id="card-modal">
  <div class="modal-backdrop" id="modal-backdrop"></div>
  <div class="modal-card">
    <button class="modal-close" id="modal-close">✕</button>
    <div class="modal-rarity-bar">
      <span class="modal-rarity" id="modal-rarity"></span>
      <span class="modal-category" id="modal-category"></span>
    </div>
    <div class="modal-name" id="modal-name"></div>
    <div class="modal-resist-row">
      <span class="modal-resist-num" id="modal-resist"></span>
      <span class="modal-resist-label">抗AI值</span>
    </div>
    <div class="modal-divider"></div>
    <div class="modal-desc" id="modal-desc"></div>
    <button class="modal-swap-btn" id="modal-swap-btn">换成这个职业</button>
  </div>
</div>

<!-- ===== ELIM ===== -->
<div id="elim-screen" class="screen">
  <div class="elim-header">
    <div class="elim-year" id="elim-year">2026</div>
    <div class="elim-subtitle">本年淘汰名单</div>
  </div>
  <div class="elim-list" id="elim-list"></div>
  <div class="verdict-area" id="verdict-area" style="display:none">
    <div class="verdict-box" id="verdict-box">
      <div class="verdict-status" id="verdict-status"></div>
      <div class="verdict-msg" id="verdict-msg"></div>
    </div>
    <button class="action-btn primary" id="elim-next-btn">继续</button>
  </div>
</div>

<!-- ===== FAIL ===== -->
<div id="fail-screen" class="screen">
  <div class="fail-content">
    <div class="fail-year-big" id="fail-year-big">2028</div>
    <div class="fail-title">你失业了。</div>
    <div class="fail-text" id="fail-text"></div>
    <div class="fail-btns">
      <button class="action-btn primary" id="retry-btn">退回这一年，重新选择</button>
      <button class="action-btn" id="restart-btn">重新开始</button>
    </div>
  </div>
</div>

<!-- ===== ENDING ===== -->
<div id="ending-screen" class="screen">
  <div class="ending-content">
    <div class="ending-label">2035 · 档案封存</div>
    <div class="ending-title" id="ending-title">你活下来了。</div>
    <div class="ending-text" id="ending-text"></div>
    <button class="action-btn primary" id="play-again-btn">再玩一次</button>
  </div>
</div>

<script>

const YEARS = [

// ===== STATE =====
let G = {
  ownCard: null,
  currentCard: null,
  yearIndex: 0,
  drawnCards: [],
  swappedThisYear: false,
  startOfYearCard: null,
  modalCardIndex: null
};

// ===== HELPERS =====
function $(id) { return document.getElementById(id); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
  window.scrollTo(0, 0);
}

function randomCards(n, exclude = []) {
  const pool = CARD_POOL.filter(c => !exclude.includes(c.name));
  return [...pool].sort(() => Math.random() - 0.5).slice(0, n);
}

function updateHUD() {
  const y = YEARS[G.yearIndex];
  $('hud-year').textContent = y.year;
  $('hud-count').textContent = `第 ${G.yearIndex + 1} 年 / 共 10 年`;
  const dots = $('hud-dots');
  dots.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const d = document.createElement('div');
    d.className = 'hud-dot' + (i < G.yearIndex ? ' done' : i === G.yearIndex ? ' current' : '');
    dots.appendChild(d);
  }
}

function updateCurrentCard() {
  const c = G.currentCard;
  $('cc-name').textContent = c.name;
  $('cc-resist').textContent = c.aiResist;
  $('cc-desc').textContent = c.desc;
  const ownTag = $('cc-own-tag');
  const card = $('current-card');
  if (c.isOwn) {
    ownTag.style.display = 'block';
    card.classList.add('own-card');
  } else {
    ownTag.style.display = 'none';
    card.classList.remove('own-card');
  }
  const backBtn = $('back-own-btn');
  backBtn.style.display = (!c.isOwn && G.ownCard) ? 'block' : 'none';
}

function renderEventText() {
  const y = YEARS[G.yearIndex];
  $('ev-year-label').textContent = `${y.year} · 大事记`;
  $('ev-slogan').textContent = '';
  const el = $('ev-text');
  el.textContent = '';
  let i = 0;
  const text = y.event;
  const timer = setInterval(() => {
    if (i < text.length) {
      el.textContent += text[i];
      i++;
    } else {
      clearInterval(timer);
      $('ev-slogan').textContent = '— ' + y.slogan;
    }
  }, 12);
}

function renderDrawSlots() {
  const slots = $('draw-slots');
  slots.innerHTML = '';
  G.drawnCards.forEach((card, i) => {
    const div = document.createElement('div');
    div.className = 'draw-slot face-down';
    div.dataset.index = i;
    slots.appendChild(div);
    setTimeout(() => {
      div.className = 'draw-slot face-up';
      div.innerHTML = `
        <span class="slot-rarity r-${card.rarity}">${card.rarity}</span>
        <span class="slot-resist">${card.aiResist}</span>
        <span class="slot-name">${card.name}</span>`;
      div.addEventListener('click', () => openModal(i));
    }, 400 * (i + 1));
  });
}

// ===== MODAL =====
function openModal(index) {
  const card = G.drawnCards[index];
  G.modalCardIndex = index;
  $('modal-name').textContent = card.name;
  $('modal-rarity').textContent = card.rarity;
  $('modal-rarity').className = `modal-rarity r-${card.rarity}`;
  $('modal-category').textContent = card.category;
  $('modal-resist').textContent = card.aiResist;
  $('modal-desc').textContent = card.desc;

  const swapBtn = $('modal-swap-btn');
  if (G.swappedThisYear) {
    swapBtn.disabled = true;
    swapBtn.textContent = '今年已换过职业';
  } else {
    swapBtn.disabled = false;
    swapBtn.textContent = '换成这个职业';
  }

  $('card-modal').classList.add('open');
}

function closeModal() {
  $('card-modal').classList.remove('open');
  G.modalCardIndex = null;
}

// ===== GAME FLOW =====
function startYear() {
  G.swappedThisYear = false;
  G.startOfYearCard = {...G.currentCard};
  G.drawnCards = randomCards(5, [G.currentCard.name]);

  updateHUD();
  updateCurrentCard();
  renderEventText();
  renderDrawSlots();
  $('keep-btn').textContent = '保留当前职业，进入事件';
  showScreen('game-screen');
}

function proceedToElim() {
  const y = YEARS[G.yearIndex];
  $('elim-year').textContent = y.year;
  $('verdict-area').style.display = 'none';

  const list = $('elim-list');
  list.innerHTML = '';

  showScreen('elim-screen');

  y.eliminated.forEach((job, i) => {
    const isMine = job === G.currentCard.name;
    const div = document.createElement('div');
    div.className = 'elim-item' + (isMine ? ' mine' : '');
    div.innerHTML = `
      <div class="elim-dot"></div>
      <div class="elim-job">${job}</div>
      ${isMine ? '<div class="elim-tag">你的职业</div>' : ''}`;
    list.appendChild(div);
    setTimeout(() => div.classList.add('visible'), 400 * (i + 1));
  });

  setTimeout(() => showVerdict(y), 400 * (y.eliminated.length + 1) + 400);
}

function showVerdict(y) {
  const isElim = y.eliminated.includes(G.currentCard.name);
  const box = $('verdict-box');
  $('verdict-area').style.display = 'block';

  if (isElim) {
    box.className = 'verdict-box failed';
    $('verdict-status').textContent = '已淘汰';
    $('verdict-msg').textContent = `${y.year}年，你持有的「${G.currentCard.name}」进入了淘汰名单。`;
    $('elim-next-btn').textContent = '查看失业档案';
    $('elim-next-btn').onclick = () => showFail(y);
  } else {
    box.className = 'verdict-box survived';
    const left = 10 - G.yearIndex - 1;
    $('verdict-status').textContent = '幸存';
    $('verdict-msg').textContent = left > 0
      ? `「${G.currentCard.name}」这一年安全。还有 ${left} 年。`
      : `「${G.currentCard.name}」活过了2035年。`;
    $('elim-next-btn').textContent = G.yearIndex >= 9 ? '查看结局' : `进入 ${y.year + 1} 年 →`;
    $('elim-next-btn').onclick = () => {
      if (G.yearIndex >= 9) showEnding();
      else { G.yearIndex++; startYear(); }
    };
  }
}

function showFail(y) {
  showScreen('fail-screen');
  $('fail-year-big').textContent = y.year;
  $('fail-text').textContent =
    `${y.year}年。${y.event.split('\n')[0].split('。').slice(0,2).join('。')}。\n\n你持有的「${G.currentCard.name}」在这一年进入了淘汰名单。\n\n不是你的错。只是时代的滚轮，刚好从你这里压过去了。`;
}

function showEnding() {
  showScreen('ending-screen');
  const usedOwn = G.currentCard.isOwn;
  $('ending-title').textContent = '你活下来了。';
  let html = '';
  if (usedOwn) {
    html = `<p>十年。</p>
<p>你从2026年开始，就带着「<span class="highlight">${G.ownCard.name}</span>」这张卡，一路走到了2035年。</p>
<p>你看着身边的人一个一个离开，看着那些职业的名字从档案里消失。但你还在，做着你一开始做的那件事。</p>
<p>不是因为你比别人聪明，也不是因为你的职业更安全。</p>
<p>是因为你一直在翻这副牌。一直想知道，还有哪张没有。</p>
<p>你知道这没什么用。但你就是想知道。</p>
<p class="highlight">这件事，AI不懂。</p>`;
  } else {
    html = `<p>十年。</p>
<p>你从「${G.ownCard.name}」出发，在这十年里换了身份，最终以「<span class="highlight">${G.currentCard.name}</span>」活到了2035年。</p>
<p>你看着身边的人一个一个离开。有几年你也差一点。</p>
<p>但你换了方向，你还在。</p>
<p>不是因为你逃得快，是因为你一直在看那些消失的名字，一直在想下一步。</p>
<p class="highlight">这件事，AI不懂。</p>`;
  }
  $('ending-text').innerHTML = html;
}

// ===== LISTENERS =====
$('start-btn').addEventListener('click', () => {
  const job = $('job-input').value.trim();
  if (!job) { $('job-input').focus(); return; }
  G.ownCard = { name: job, rarity: 'N', aiResist: Math.floor(Math.random() * 26) + 60, category: '本职', desc: '这是你现在的职业。', isOwn: true };
  G.currentCard = {...G.ownCard};
  G.yearIndex = 0;
  startYear();
});

$('job-input').addEventListener('keydown', e => { if (e.key === 'Enter') $('start-btn').click(); });

$('keep-btn').addEventListener('click', proceedToElim);

$('back-own-btn').addEventListener('click', () => {
  if (G.swappedThisYear) return;
  G.currentCard = {...G.ownCard, isOwn: true};
  G.swappedThisYear = true;
  updateCurrentCard();
  Array.from($('draw-slots').children).forEach(s => s.classList.remove('selected'));
  $('keep-btn').textContent = '确认换回本职，进入事件';
});

$('modal-close').addEventListener('click', closeModal);
$('modal-backdrop').addEventListener('click', closeModal);

$('modal-swap-btn').addEventListener('click', () => {
  if (G.modalCardIndex === null || G.swappedThisYear) return;
  const card = G.drawnCards[G.modalCardIndex];
  G.currentCard = {...card, isOwn: false};
  G.swappedThisYear = true;
  updateCurrentCard();
  Array.from($('draw-slots').children).forEach((s, i) => {
    s.classList.toggle('selected', i === G.modalCardIndex);
  });
  $('keep-btn').textContent = '确认换职，进入事件';
  closeModal();
});

$('retry-btn').addEventListener('click', () => {
  G.currentCard = {...G.startOfYearCard};
  startYear();
});

$('restart-btn').addEventListener('click', () => {
  G = { ownCard:null, currentCard:null, yearIndex:0, drawnCards:[], swappedThisYear:false, startOfYearCard:null, modalCardIndex:null };
  $('job-input').value = '';
  showScreen('intro-screen');
});

$('play-again-btn').addEventListener('click', () => {
  G.currentCard = {...G.ownCard};
  G.yearIndex = 0;
  startYear();
});
</script>
