<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我的事业</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --kokutan: #0d0a06;
  --kokutan-light: #1a1208;
  --kokutan-mid: #241a0c;
  --shironeri: #ede8dc;
  --shironeri-dim: #a09070;
  --shironeri-ghost: #4a4030;
  --shu: #c03020;
  --shu-dim: #6a1a10;
  --shu-glow: rgba(192,48,32,0.15);
}

body {
  background: var(--kokutan);
  color: var(--shironeri);
  font-family: 'Songti SC', 'Noto Serif SC', 'Noto Serif CJK SC', 'STSong', 'SimSun', Georgia, serif;
  min-height: 100vh;
  overflow-x: hidden;
}

.screen { display: none; }
.screen.active { display: flex; flex-direction: column; min-height: 100vh; }

/* ===== INTRO ===== */
#intro-screen { justify-content: flex-end; }

.intro-content { padding: 0 28px 60px; }

.game-badge {
  font-size: 10px;
  letter-spacing: 4px;
  color: var(--shu);
  margin-bottom: 20px;
  opacity: 0.8;
}

.game-title {
  font-size: 36px;
  letter-spacing: 10px;
  color: var(--shironeri);
  margin-bottom: 6px;
}

.game-subtitle {
  font-size: 11px;
  color: var(--shironeri-ghost);
  letter-spacing: 2px;
  margin-bottom: 36px;
}

.intro-divider { width: 40px; height: 1px; background: var(--shu-dim); margin-bottom: 28px; }

.intro-body {
  font-size: 14px;
  line-height: 2.4;
  color: var(--shironeri-dim);
  margin-bottom: 40px;
}

.data-point {
  color: var(--shu);
  font-size: 24px;
  display: block;
  margin: 6px 0 10px;
  letter-spacing: 2px;
}

.intro-strong { color: var(--shironeri); }
.intro-ellipsis { color: var(--shironeri-ghost); display: block; margin-top: 8px; letter-spacing: 6px; }

.input-label { font-size: 10px; color: var(--shironeri-ghost); letter-spacing: 3px; margin-bottom: 10px; }

.job-input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--shironeri-ghost);
  color: var(--shironeri);
  font-family: inherit;
  font-size: 20px;
  letter-spacing: 2px;
  padding: 8px 0 12px;
  outline: none;
  margin-bottom: 32px;
  border-radius: 0;
}
.job-input::placeholder { color: var(--shironeri-ghost); font-size: 14px; letter-spacing: 1px; }
.job-input:focus { border-bottom-color: var(--shironeri-dim); }

.start-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 18px 24px;
  background: var(--shu);
  border: none;
  color: var(--shironeri);
  font-family: inherit;
  font-size: 14px;
  letter-spacing: 4px;
  cursor: pointer;
  border-radius: 2px;
}
.start-btn:active { background: #a02818; }

/* ===== GAME ===== */
.game-hud {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 24px 12px;
  border-bottom: 1px solid #1a1208;
}

.hud-year { font-size: 24px; color: var(--shironeri); letter-spacing: 6px; }

.hud-right { text-align: right; }
.hud-count { font-size: 10px; color: var(--shironeri-ghost); letter-spacing: 2px; display: block; margin-bottom: 4px; }
.hud-dots { display: flex; gap: 4px; justify-content: flex-end; }
.hud-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--shironeri-ghost); }
.hud-dot.done { background: var(--shu); }
.hud-dot.current { background: var(--shironeri-dim); }

.event-area { padding: 20px 24px 16px; flex: 1; overflow-y: auto; }
.event-year-label { font-size: 10px; color: var(--shu); letter-spacing: 4px; margin-bottom: 10px; opacity: 0.8; }
.event-text { font-size: 13px; line-height: 2; color: var(--shironeri-dim); min-height: 60px; white-space: pre-wrap; }
.event-slogan { font-size: 11px; color: var(--shironeri-ghost); letter-spacing: 4px; margin-top: 12px; padding-top: 12px; border-top: 1px solid #1a1208; }

.draw-area { padding: 16px 24px; }
.draw-label { font-size: 10px; color: var(--shironeri-ghost); letter-spacing: 3px; margin-bottom: 12px; }

.draw-slots { display: flex; gap: 8px; margin-bottom: 6px; }

.draw-slot {
  flex: 1;
  aspect-ratio: 2/3;
  border: 1px solid var(--shironeri-ghost);
  border-radius: 4px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  background: var(--kokutan-light);
  transition: border-color 0.2s;
}
.draw-slot.face-down { display: flex; align-items: center; justify-content: center; }
.draw-slot.face-down::after { content: '◆'; color: #1a1208; font-size: 16px; }
.draw-slot.face-up:active { border-color: var(--shironeri-dim); }
.draw-slot.selected { border-color: var(--shu) !important; box-shadow: 0 0 8px var(--shu-glow); }
.draw-slot.known { border-color: #2a3020; }

.slot-rarity { position: absolute; top: 4px; right: 4px; font-size: 8px; padding: 1px 3px; border-radius: 2px; }
.slot-name { position: absolute; bottom: 0; left: 0; right: 0; padding: 3px 4px 4px; font-size: 9px; line-height: 1.3; color: var(--shironeri-dim); text-align: center; background: linear-gradient(to top, var(--kokutan-light), transparent); }
.slot-resist { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -60%); font-size: 18px; color: var(--shironeri-ghost); }
.slot-known-dot { position: absolute; top: 4px; left: 4px; width: 4px; height: 4px; border-radius: 50%; background: #5a8040; }

.r-N { background: #1a1a18; color: #555550; border: 1px solid #2a2a28; }
.r-R { background: #0a1020; color: #4060a0; border: 1px solid #1a2840; }
.r-SR { background: #100a20; color: #7050a0; border: 1px solid #280a40; }
.r-SSR { background: #181200; color: #a08020; border: 1px solid #403000; }
.r-UR { background: #180808; color: #c03020; border: 1px solid #4a1010; }

.current-area { padding: 0 24px 28px; }
.current-label {
  font-size: 10px;
  color: var(--shironeri-ghost);
  letter-spacing: 3px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.back-own-link {
  font-size: 10px; color: var(--shu-dim); cursor: pointer;
  border: none; background: none; font-family: inherit; padding: 0;
}
.back-own-link:active { color: var(--shu); }

.current-card {
  background: var(--kokutan-light);
  border: 1px solid var(--shironeri-ghost);
  border-radius: 6px;
  padding: 16px 18px;
}
.current-card.own-card { border-color: var(--shu-dim); }

.cc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.cc-name { font-size: 22px; color: var(--shironeri); letter-spacing: 2px; }
.cc-own-tag { font-size: 9px; color: var(--shu); letter-spacing: 2px; margin-top: 2px; }
.cc-right { text-align: right; }
.cc-resist-label { font-size: 9px; color: var(--shironeri-ghost); letter-spacing: 1px; }
.cc-resist-val { font-size: 28px; color: var(--shironeri-dim); }
.cc-desc { font-size: 12px; line-height: 1.8; color: var(--shironeri-ghost); margin-bottom: 14px; }

.action-btn {
  width: 100%;
  padding: 14px;
  border: 1px solid var(--shironeri-ghost);
  background: transparent;
  color: var(--shironeri-dim);
  font-family: inherit;
  font-size: 12px;
  letter-spacing: 3px;
  cursor: pointer;
  border-radius: 2px;
  text-align: center;
}
.action-btn:active { border-color: var(--shironeri-dim); color: var(--shironeri); }
.action-btn.primary { background: var(--shu); border-color: var(--shu); color: var(--shironeri); }
.action-btn.primary:active { background: #a02818; }
.action-btn + .action-btn { margin-top: 10px; }

/* ===== MODAL (Card Detail) ===== */
#card-modal, #enc-modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(13,10,6,0.92);
  align-items: flex-end;
  justify-content: center;
}
#card-modal.open, #enc-modal.open { display: flex; }

.modal-backdrop { position: absolute; inset: 0; }

.modal-sheet {
  position: relative;
  width: 100%;
  max-width: 480px;
  background: var(--kokutan-light);
  border-top: 1px solid var(--shironeri-ghost);
  border-radius: 12px 12px 0 0;
  padding: 32px 28px 48px;
  animation: slideUp 0.25s ease;
  max-height: 85vh;
  overflow-y: auto;
}

@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.modal-close {
  position: absolute; top: 16px; right: 20px;
  background: none; border: none; color: var(--shironeri-ghost);
  font-size: 20px; cursor: pointer; padding: 4px; font-family: inherit;
}

.modal-rarity-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.modal-rarity { font-size: 10px; padding: 3px 8px; border-radius: 2px; }
.modal-category { font-size: 10px; color: var(--shironeri-ghost); letter-spacing: 2px; }
.modal-known-badge { font-size: 10px; color: #5a8040; letter-spacing: 1px; margin-left: auto; }

.modal-name { font-size: 28px; color: var(--shironeri); letter-spacing: 4px; margin-bottom: 8px; }
.modal-resist-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 20px; }
.modal-resist-num { font-size: 42px; color: var(--shironeri-dim); line-height: 1; }
.modal-resist-label { font-size: 11px; color: var(--shironeri-ghost); letter-spacing: 1px; }
.modal-divider { height: 1px; background: #1a1208; margin-bottom: 20px; }
.modal-desc { font-size: 14px; line-height: 2.2; color: var(--shironeri-dim); margin-bottom: 28px; }

.modal-elim-note { font-size: 11px; color: var(--shu-dim); letter-spacing: 2px; margin-bottom: 20px; padding: 10px 14px; border: 1px solid var(--shu-dim); border-radius: 2px; }

.modal-swap-btn {
  width: 100%;
  padding: 16px;
  background: var(--shu);
  border: none;
  color: var(--shironeri);
  font-family: inherit;
  font-size: 13px;
  letter-spacing: 4px;
  cursor: pointer;
  border-radius: 2px;
}
.modal-swap-btn:active { background: #a02818; }
.modal-swap-btn:disabled { background: var(--shironeri-ghost); color: var(--kokutan-light); cursor: default; }

/* ===== ENCYCLOPEDIA MODAL ===== */
.enc-header { margin-bottom: 24px; }
.enc-title { font-size: 20px; color: var(--shironeri); letter-spacing: 4px; margin-bottom: 4px; }
.enc-count { font-size: 11px; color: var(--shironeri-ghost); letter-spacing: 2px; }

.enc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.enc-card {
  background: var(--kokutan);
  border: 1px solid #1a1208;
  border-radius: 4px;
  padding: 12px;
  cursor: pointer;
  transition: border-color 0.2s;
}
.enc-card:active { border-color: var(--shironeri-ghost); }
.enc-card.eliminated { opacity: 0.5; }

.enc-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.enc-card-name { font-size: 14px; color: var(--shironeri-dim); }
.enc-card-rarity { font-size: 8px; padding: 1px 4px; border-radius: 2px; }
.enc-card-resist { font-size: 18px; color: var(--shironeri-ghost); margin-bottom: 4px; }
.enc-card-status { font-size: 9px; color: var(--shironeri-ghost); letter-spacing: 1px; }
.enc-card.eliminated .enc-card-status { color: var(--shu-dim); }

.enc-btn-row { margin-top: 20px; }

/* ===== ELIM ===== */
#elim-screen { padding: 0; }

.elim-header { padding: 40px 28px 24px; border-bottom: 1px solid #1a1208; }
.elim-year { font-size: 40px; color: var(--shironeri); letter-spacing: 8px; margin-bottom: 4px; }
.elim-subtitle { font-size: 11px; color: var(--shironeri-ghost); letter-spacing: 3px; }

.elim-list { padding: 24px 28px; flex: 1; }
.elim-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0; border-bottom: 1px solid #1a1208;
  opacity: 0; transform: translateX(-8px); transition: all 0.3s;
}
.elim-item.visible { opacity: 1; transform: translateX(0); }
.elim-item.mine { padding: 14px 0; }

.elim-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--shironeri-ghost); flex-shrink: 0; }
.elim-item.mine .elim-dot { background: var(--shu); width: 8px; height: 8px; }
.elim-job { font-size: 16px; color: var(--shironeri-dim); }
.elim-item.mine .elim-job { color: var(--shu); font-size: 18px; }
.elim-tag { font-size: 10px; color: var(--shu-dim); letter-spacing: 1px; margin-left: auto; }

.verdict-area { padding: 0 28px 40px; }
.verdict-box { padding: 24px; border: 1px solid var(--shironeri-ghost); border-radius: 4px; text-align: center; margin-bottom: 20px; }
.verdict-box.survived { border-color: #2a4a2a; background: #060d06; }
.verdict-box.failed { border-color: var(--shu-dim); background: #0d0606; }
.verdict-status { font-size: 12px; letter-spacing: 4px; margin-bottom: 8px; }
.survived .verdict-status { color: #50a050; }
.failed .verdict-status { color: var(--shu); }
.verdict-msg { font-size: 13px; color: var(--shironeri-ghost); line-height: 1.8; }

/* ===== FAIL ===== */
#fail-screen { justify-content: flex-end; }
.fail-content { padding: 40px 28px 60px; }
.fail-year-big { font-size: 56px; color: var(--shu); letter-spacing: 8px; opacity: 0.6; margin-bottom: 4px; }
.fail-title { font-size: 20px; color: var(--shironeri); letter-spacing: 4px; margin-bottom: 24px; }
.fail-text { font-size: 13px; line-height: 2.2; color: var(--shironeri-ghost); margin-bottom: 40px; padding: 20px; border: 1px solid #1a1208; background: #0a0806; border-radius: 4px; white-space: pre-wrap; }
.fail-btns { display: flex; flex-direction: column; gap: 10px; }

/* ===== ENDING ===== */
#ending-screen { justify-content: flex-end; }
.ending-content { padding: 40px 28px 60px; }
.ending-label { font-size: 10px; color: var(--shu); letter-spacing: 4px; margin-bottom: 16px; }
.ending-title { font-size: 28px; color: var(--shironeri); letter-spacing: 4px; margin-bottom: 32px; line-height: 1.4; }
.ending-text { font-size: 14px; line-height: 2.4; color: var(--shironeri-dim); margin-bottom: 40px; }
.ending-text p { margin-bottom: 20px; }
.ending-highlight { color: var(--shironeri); }
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro-screen" class="screen active">
  <div class="intro-content">
    <div class="game-badge">ANTHROPIC RESEARCH · 2026</div>
    <div class="game-title">我的事业</div>
    <div class="game-subtitle">2026–2035 · AI时代职业生存</div>
    <div class="intro-divider"></div>
    <div class="intro-body">
      2026年，Anthropic发布研究报告：<span class="data-point">67%</span>的职业面临AI替代风险。<span class="intro-strong">这不是预测，是时间表。</span><span class="intro-ellipsis">…</span>从这一年开始，每年都有职业从世界上消失。<br>你的呢？
    </div>
    <div class="input-label">你现在的职业是</div>
    <input class="job-input" id="job-input" type="text" placeholder="编导、程序员、设计师……" maxlength="12" autocomplete="off">
    <button class="start-btn" id="start-btn"><span>看我的事业能撑多久</span><span>→</span></button>
  </div>
</div>

<!-- GAME -->
<div id="game-screen" class="screen">
  <div class="game-hud">
    <div class="hud-year" id="hud-year">2026</div>
    <div class="hud-right">
      <span class="hud-count" id="hud-count">第 1 年 / 共 10 年</span>
      <div class="hud-dots" id="hud-dots"></div>
    </div>
  </div>

  <div class="event-area">
    <div class="event-year-label" id="ev-year-label">2026 · 今年发生了</div>
    <div class="event-text" id="ev-text"></div>
    <div class="event-slogan" id="ev-slogan"></div>
  </div>

  <div class="draw-area">
    <div class="draw-label" id="draw-label">本年出现的职业 · 点击查看详情</div>
    <div class="draw-slots" id="draw-slots"></div>
  </div>

  <div class="current-area">
    <div class="current-label">
      <span>我现在的职业</span>
      <button class="back-own-link" id="back-own-btn" style="display:none">换回原职 →</button>
    </div>
    <div class="current-card" id="current-card">
      <div class="cc-top">
        <div>
          <div class="cc-name" id="cc-name">—</div>
          <div class="cc-own-tag" id="cc-own-tag" style="display:none">原职</div>
        </div>
        <div class="cc-right">
          <div class="cc-resist-label">抗AI值</div>
          <div class="cc-resist-val" id="cc-resist">—</div>
        </div>
      </div>
      <div class="cc-desc" id="cc-desc"></div>
      <button class="action-btn primary" id="keep-btn">保留，进入这一年</button>
    </div>
  </div>
</div>

<!-- CARD DETAIL MODAL -->
<div id="card-modal">
  <div class="modal-backdrop" id="card-modal-backdrop"></div>
  <div class="modal-sheet">
    <button class="modal-close" id="card-modal-close">✕</button>
    <div class="modal-rarity-row">
      <span class="modal-rarity" id="m-rarity"></span>
      <span class="modal-category" id="m-category"></span>
      <span class="modal-known-badge" id="m-known"></span>
    </div>
    <div class="modal-name" id="m-name"></div>
    <div class="modal-resist-row">
      <span class="modal-resist-num" id="m-resist"></span>
      <span class="modal-resist-label">抗AI值</span>
    </div>
    <div class="modal-divider"></div>
    <div class="modal-desc" id="m-desc"></div>
    <div class="modal-elim-note" id="m-elim-note" style="display:none"></div>
    <button class="modal-swap-btn" id="modal-swap-btn">换成这个职业</button>
  </div>
</div>

<!-- ENCYCLOPEDIA MODAL -->
<div id="enc-modal">
  <div class="modal-backdrop" id="enc-modal-backdrop"></div>
  <div class="modal-sheet">
    <button class="modal-close" id="enc-modal-close">✕</button>
    <div class="enc-header">
      <div class="enc-title">职业图鉴</div>
      <div class="enc-count" id="enc-count">已收录 0 个职业</div>
    </div>
    <div class="enc-grid" id="enc-grid"></div>
    <div class="enc-btn-row">
      <button class="action-btn" id="enc-close-btn">关闭图鉴</button>
    </div>
  </div>
</div>

<!-- ELIM -->
<div id="elim-screen" class="screen">
  <div class="elim-header">
    <div class="elim-year" id="elim-year">2026</div>
    <div class="elim-subtitle">本年AI淘汰的职业</div>
  </div>
  <div class="elim-list" id="elim-list"></div>
  <div class="verdict-area" id="verdict-area" style="display:none">
    <div class="verdict-box" id="verdict-box">
      <div class="verdict-status" id="verdict-status"></div>
      <div class="verdict-msg" id="verdict-msg"></div>
    </div>
    <button class="action-btn primary" id="elim-next-btn">继续</button>
  </div>
</div>

<!-- FAIL -->
<div id="fail-screen" class="screen">
  <div class="fail-content">
    <div class="fail-year-big" id="fail-year-big">2028</div>
    <div class="fail-title">你失业了。</div>
    <div class="fail-text" id="fail-text"></div>
    <div class="fail-btns">
      <button class="action-btn primary" id="retry-btn">退回这一年，重新选择</button>
      <button class="action-btn" id="enc-fail-btn">查看已收录的职业图鉴</button>
      <button class="action-btn" id="restart-btn">重新开始</button>
    </div>
  </div>
</div>

<!-- ENDING -->
<div id="ending-screen" class="screen">
  <div class="ending-content">
    <div class="ending-label">2035 · 最终年</div>
    <div class="ending-title">你活下来了。</div>
    <div class="ending-text" id="ending-text"></div>
    <button class="action-btn" id="enc-ending-btn" style="margin-bottom:10px">查看这十年见过的职业</button>
    <button class="action-btn primary" id="play-again-btn">再玩一次</button>
  </div>
</div>

<script>
// ===== DATA =====

// Precompute which year each card gets eliminated (-1 = never)
const ELIM_YEAR = {};
YEARS.forEach(y => { y.eliminated.forEach(name => { if (!ELIM_YEAR[name]) ELIM_YEAR[name] = y.year; }); });
CARD_POOL.forEach(c => { if (!ELIM_YEAR[c.name]) ELIM_YEAR[c.name] = -1; });

// ===== STATE =====
let G = {
  ownCard: null,
  currentCard: null,
  yearIndex: 0,
  drawnCards: [],
  swappedThisYear: false,
  startOfYearCard: null,
  modalCardIndex: null,
  encyclopedia: {}  // name -> { card, firstSeen: year, timesDrawn }

// ===== HELPERS =====
const $ = id => document.getElementById(id);

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
  window.scrollTo(0, 0);
}

// Weighted random draw: cards in encyclopedia get 2.5x weight
function randomCards(n, excludeNames = []) {
  const pool = CARD_POOL.filter(c => !excludeNames.includes(c.name));
  const weighted = [];
  pool.forEach(c => {
    const w = G.encyclopedia[c.name] ? 2.5 : 1;
    for (let i = 0; i < w * 10; i++) weighted.push(c);
  });
  const seen = new Set();
  const result = [];
  const shuffled = weighted.sort(() => Math.random() - 0.5);
  for (const c of shuffled) {
    if (!seen.has(c.name) && result.length < n) { seen.add(c.name); result.push(c); }
    if (result.length >= n) break;
  }
  // Fallback if not enough
  if (result.length < n) {
    pool.filter(c => !seen.has(c.name)).slice(0, n - result.length).forEach(c => result.push(c));
  }
  return result;
}

function addToEncyclopedia(card) {
  const year = YEARS[G.yearIndex].year;
  if (G.encyclopedia[card.name]) {
    G.encyclopedia[card.name].timesDrawn++;
  } else {
    G.encyclopedia[card.name] = { card: {...card}, firstSeen: year, timesDrawn: 1 };
  }
}

function isEliminated(cardName, byYear) {
  const ey = ELIM_YEAR[cardName];
  return ey !== -1 && ey <= byYear;
}

function updateHUD() {
  const y = YEARS[G.yearIndex];
  $('hud-year').textContent = y.year;
  $('hud-count').textContent = `第 ${G.yearIndex + 1} 年 / 共 10 年`;
  const dots = $('hud-dots');
  dots.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const d = document.createElement('div');
    d.className = 'hud-dot' + (i < G.yearIndex ? ' done' : i === G.yearIndex ? ' current' : '');
    dots.appendChild(d);
  }
}

function updateCurrentCard() {
  const c = G.currentCard;
  $('cc-name').textContent = c.name;
  $('cc-resist').textContent = c.aiResist;
  $('cc-desc').textContent = c.desc;
  $('cc-own-tag').style.display = c.isOwn ? 'block' : 'none';
  $('current-card').classList.toggle('own-card', !!c.isOwn);
  $('back-own-btn').style.display = (!c.isOwn && G.ownCard) ? 'block' : 'none';
}

// ===== YEAR START =====
function startYear() {
  G.swappedThisYear = false;
  G.startOfYearCard = {...G.currentCard};
  G.drawnCards = randomCards(5, [G.currentCard.name]);
  // Add all drawn cards to encyclopedia
  G.drawnCards.forEach(c => addToEncyclopedia(c));

  updateHUD();
  updateCurrentCard();
  renderEventText();
  renderDrawSlots();

  const encCount = Object.keys(G.encyclopedia).length;
  $('draw-label').textContent = `本年出现的职业 · 已收录 ${encCount} 种 · 点击查看`;
  $('keep-btn').textContent = '保留，进入这一年';

  showScreen('game-screen');
}

function renderEventText() {
  const y = YEARS[G.yearIndex];
  $('ev-year-label').textContent = `${y.year} · 今年发生了`;
  $('ev-slogan').textContent = '';
  const el = $('ev-text');
  el.textContent = '';
  let i = 0;
  const text = y.event;
  const timer = setInterval(() => {
    if (i < text.length) { el.textContent += text[i]; i++; }
    else { clearInterval(timer); $('ev-slogan').textContent = '— ' + y.slogan; }
  }, 12);
}

function renderDrawSlots() {
  const slots = $('draw-slots');
  slots.innerHTML = '';
  G.drawnCards.forEach((card, i) => {
    const div = document.createElement('div');
    div.className = 'draw-slot face-down';
    div.dataset.index = i;
    slots.appendChild(div);
    setTimeout(() => {
      const wasKnown = G.encyclopedia[card.name] && G.encyclopedia[card.name].timesDrawn > 1;
      div.className = 'draw-slot face-up' + (wasKnown ? ' known' : '');
      div.innerHTML = `
        ${wasKnown ? '<span class="slot-known-dot"></span>' : ''}
        <span class="slot-rarity r-${card.rarity}">${card.rarity}</span>
        <span class="slot-resist">${card.aiResist}</span>
        <span class="slot-name">${card.name}</span>`;
      div.addEventListener('click', () => openCardModal(i));
    }, 350 * (i + 1));
  });
}

// ===== CARD MODAL =====
function openCardModal(index) {
  const card = G.drawnCards[index];
  G.modalCardIndex = index;
  const currentYear = YEARS[G.yearIndex].year;
  const elimYear = ELIM_YEAR[card.name];
  const willBeElim = elimYear !== -1 && elimYear <= currentYear;

  $('m-name').textContent = card.name;
  $('m-rarity').textContent = card.rarity;
  $('m-rarity').className = `modal-rarity r-${card.rarity}`;
  $('m-category').textContent = card.category;
  $('m-resist').textContent = card.aiResist;
  $('m-desc').textContent = card.desc;

  const enc = G.encyclopedia[card.name];
  $('m-known').textContent = enc && enc.timesDrawn > 1 ? `已见过 ${enc.timesDrawn} 次` : '';

  const elimNote = $('m-elim-note');
  if (willBeElim) {
    elimNote.style.display = 'block';
    elimNote.textContent = `⚠ 此职业在 ${elimYear} 年被AI淘汰`;
  } else if (elimYear !== -1) {
    elimNote.style.display = 'block';
    elimNote.textContent = `预计在 ${elimYear} 年后面临风险`;
  } else {
    elimNote.style.display = 'none';
  }

  const swapBtn = $('modal-swap-btn');
  if (G.swappedThisYear) {
    swapBtn.disabled = true;
    swapBtn.textContent = '今年已换过职业';
  } else if (willBeElim) {
    swapBtn.disabled = false;
    swapBtn.textContent = '换成这个职业（高风险）';
  } else {
    swapBtn.disabled = false;
    swapBtn.textContent = '换成这个职业';
  }

  $('card-modal').classList.add('open');
}

function closeCardModal() { $('card-modal').classList.remove('open'); G.modalCardIndex = null; }

// ===== ENCYCLOPEDIA MODAL =====
function openEncModal() {
  const entries = Object.values(G.encyclopedia).sort((a, b) => {
    const ra = ['N','R','SR','SSR','UR'].indexOf(a.card.rarity);
    const rb = ['N','R','SR','SSR','UR'].indexOf(b.card.rarity);
    return rb - ra;
  });

  $('enc-count').textContent = `已收录 ${entries.length} 个职业（共 ${CARD_POOL.length} 种）`;

  const grid = $('enc-grid');
  grid.innerHTML = '';
  const currentYear = YEARS[Math.min(G.yearIndex, 9)].year;

  entries.forEach(({ card, firstSeen, timesDrawn }) => {
    const elim = isEliminated(card.name, currentYear);
    const div = document.createElement('div');
    div.className = 'enc-card' + (elim ? ' eliminated' : '');
    div.innerHTML = `
      <div class="enc-card-top">
        <div class="enc-card-name">${card.name}</div>
        <div class="enc-card-rarity r-${card.rarity}">${card.rarity}</div>
      </div>
      <div class="enc-card-resist">${card.aiResist}</div>
      <div class="enc-card-status">${elim ? `已淘汰 · ${ELIM_YEAR[card.name]}年` : `抗AI ${card.aiResist} · 见过${timesDrawn}次`}</div>`;
    div.addEventListener('click', () => {
      closeEncModal();
      // Show detail in card modal but without swap option
      G.modalCardIndex = null;
      $('m-name').textContent = card.name;
      $('m-rarity').textContent = card.rarity;
      $('m-rarity').className = `modal-rarity r-${card.rarity}`;
      $('m-category').textContent = card.category;
      $('m-resist').textContent = card.aiResist;
      $('m-desc').textContent = card.desc;
      $('m-known').textContent = `见过 ${timesDrawn} 次 · ${firstSeen}年首次收录`;
      $('m-elim-note').style.display = elim ? 'block' : 'none';
      if (elim) $('m-elim-note').textContent = `此职业在 ${ELIM_YEAR[card.name]} 年被AI淘汰`;
      const swapBtn = $('modal-swap-btn');
      swapBtn.disabled = true;
      swapBtn.textContent = '图鉴只读，无法直接选择';
      $('card-modal').classList.add('open');
    });
    grid.appendChild(div);
  });

  if (entries.length === 0) {
    grid.innerHTML = '<div style="grid-column:span 2;color:var(--shironeri-ghost);font-size:13px;text-align:center;padding:20px">还没有收录任何职业</div>';
  }

  $('enc-modal').classList.add('open');
}

function closeEncModal() { $('enc-modal').classList.remove('open'); }

  showScreen('elim-screen');

  y.eliminated.forEach((job, i) => {
    const isMine = job === G.currentCard.name;
    const div = document.createElement('div');
    div.className = 'elim-item' + (isMine ? ' mine' : '');
    div.innerHTML = `<div class="elim-dot"></div><div class="elim-job">${job}</div>${isMine ? '<div class="elim-tag">你的职业</div>' : ''}`;
    list.appendChild(div);
    setTimeout(() => div.classList.add('visible'), 400 * (i + 1));
  });

  setTimeout(() => showVerdict(y), 400 * (y.eliminated.length + 1) + 400);
}

function showVerdict(y) {
  const isElim = y.eliminated.includes(G.currentCard.name);
  $('verdict-area').style.display = 'block';
  $('verdict-box').className = 'verdict-box ' + (isElim ? 'failed' : 'survived');
  $('verdict-status').textContent = isElim ? '已淘汰' : '幸存';

  if (isElim) {
    $('verdict-msg').textContent = `${y.year}年，你持有的「${G.currentCard.name}」进入了淘汰名单。`;
    $('elim-next-btn').textContent = '查看结果';
    $('elim-next-btn').onclick = () => showFail(y);
  } else {
    const left = 10 - G.yearIndex - 1;
    $('verdict-msg').textContent = left > 0 ? `「${G.currentCard.name}」这一年安全。还有 ${left} 年。` : `「${G.currentCard.name}」活过了2035年。`;
    $('elim-next-btn').textContent = G.yearIndex >= 9 ? '查看结局' : `进入 ${y.year + 1} 年 →`;
    $('elim-next-btn').onclick = () => { if (G.yearIndex >= 9) showEnding(); else { G.yearIndex++; startYear(); } };
  }
}

function showFail(y) {
  showScreen('fail-screen');
  $('fail-year-big').textContent = y.year;
  $('fail-text').textContent = `${y.year}年。${y.event.split('\n')[0].split('。').slice(0,2).join('。')}。\n\n你持有的「${G.currentCard.name}」在这一年进入了淘汰名单。\n\n不是你的错。只是时代的滚轮，刚好从你这里压过去了。`;
}

function showEnding() {
  showScreen('ending-screen');
  const usedOwn = G.currentCard.isOwn;
  const encSize = Object.keys(G.encyclopedia).length;
  let html = usedOwn
    ? `<p>十年。</p><p>你从2026年开始，带着「<span class="ending-highlight">${G.ownCard.name}</span>」，一路走到了2035年。</p><p>你看着身边的人一个一个离开，看着那些职业的名字从世界上消失。但你还在，做着你一开始做的那件事。</p><p>不是因为你比别人聪明，也不是因为你的职业更安全。</p><p>是因为你一直在看，一直在想。</p><p class="ending-highlight">这件事，AI不懂。</p>`
    : `<p>十年。</p><p>你从「${G.ownCard.name}」出发，最终以「<span class="ending-highlight">${G.currentCard.name}</span>」活到了2035年。</p><p>你换了方向，你还在。</p><p>不是因为你逃得快，是因为你一直在观察那些消失的名字。</p><p class="ending-highlight">这件事，AI不懂。</p>`;
  html += `<p style="font-size:12px;color:var(--shironeri-ghost)">这十年你见过 ${encSize} 种职业。</p>`;
  $('ending-text').innerHTML = html;
}

// ===== EVENT LISTENERS =====
$('start-btn').addEventListener('click', () => {
  const job = $('job-input').value.trim();
  if (!job) { $('job-input').focus(); return; }
  G.ownCard = { name: job, rarity: 'N', aiResist: Math.floor(Math.random() * 26) + 60, category: '本职', desc: '这是你现在的职业。', isOwn: true };
  G.currentCard = {...G.ownCard};
  G.yearIndex = 0;
  G.encyclopedia = {};
  startYear();
});

$('job-input').addEventListener('keydown', e => { if (e.key === 'Enter') $('start-btn').click(); });
$('keep-btn').addEventListener('click', proceedToElim);

$('back-own-btn').addEventListener('click', () => {
  if (G.swappedThisYear) return;
  G.currentCard = {...G.ownCard, isOwn: true};
  G.swappedThisYear = true;
  updateCurrentCard();
  Array.from($('draw-slots').children).forEach(s => s.classList.remove('selected'));
  $('keep-btn').textContent = '确认换回原职，进入这一年';
});

$('card-modal-backdrop').addEventListener('click', closeCardModal);
$('card-modal-close').addEventListener('click', closeCardModal);

$('modal-swap-btn').addEventListener('click', () => {
  if (G.modalCardIndex === null || G.swappedThisYear) return;
  const card = G.drawnCards[G.modalCardIndex];
  G.currentCard = {...card, isOwn: false};
  G.swappedThisYear = true;
  updateCurrentCard();
  Array.from($('draw-slots').children).forEach((s, i) => s.classList.toggle('selected', i === G.modalCardIndex));
  $('keep-btn').textContent = '确认换职，进入这一年';
  closeCardModal();
});

$('enc-modal-backdrop').addEventListener('click', closeEncModal);
$('enc-modal-close').addEventListener('click', closeEncModal);
$('enc-close-btn').addEventListener('click', closeEncModal);

$('enc-fail-btn').addEventListener('click', openEncModal);
$('enc-ending-btn').addEventListener('click', openEncModal);

// Also open enc from draw label
$('draw-label').addEventListener('click', () => { if (Object.keys(G.encyclopedia).length > 0) openEncModal(); });

$('retry-btn').addEventListener('click', () => { G.currentCard = {...G.startOfYearCard}; startYear(); });

$('restart-btn').addEventListener('click', () => {
  G = { ownCard:null, currentCard:null, yearIndex:0, drawnCards:[], swappedThisYear:false, startOfYearCard:null, modalCardIndex:null, encyclopedia:{} };
  $('job-input').value = '';
  showScreen('intro-screen');
});

$('play-again-btn').addEventListener('click', () => {
  G.currentCard = {...G.ownCard};
  G.yearIndex = 0;
  G.encyclopedia = {};
  startYear();
});
</script>
</body>
</html>
