<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>职业档案局</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0d0d0d;
  color: #e8d9b8;
  font-family: Georgia, 'Songti SC', serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 20px 0 40px;
}

#app {
  width: 100%;
  max-width: 480px;
  padding: 0 16px;
}

/* ===== SCREENS ===== */
.screen { display: none; }
.screen.active { display: block; }

/* ===== INTRO ===== */
#intro {
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 100vh;
  padding: 40px 0;
}

.title-block { margin-bottom: 40px; }

.game-title {
  font-size: 28px;
  letter-spacing: 6px;
  color: #f0d090;
  margin-bottom: 8px;
}

.game-sub {
  font-size: 13px;
  color: #7a6a4a;
  letter-spacing: 2px;
}

.intro-text {
  font-size: 15px;
  line-height: 2;
  color: #c8b898;
  margin-bottom: 40px;
  border-left: 2px solid #3a2e1a;
  padding-left: 16px;
}

.input-block label {
  display: block;
  font-size: 12px;
  color: #7a6a4a;
  letter-spacing: 2px;
  margin-bottom: 8px;
}

.input-block input {
  width: 100%;
  background: #1a1608;
  border: 1px solid #3a2e1a;
  color: #f0d090;
  font-family: Georgia, serif;
  font-size: 16px;
  padding: 12px 16px;
  outline: none;
  border-radius: 2px;
  margin-bottom: 16px;
}

.input-block input:focus { border-color: #7a5a20; }
.input-block input::placeholder { color: #3a3020; }

/* ===== BUTTONS ===== */
.btn {
  display: block;
  width: 100%;
  padding: 14px;
  background: #1a1608;
  border: 1px solid #5a4a20;
  color: #f0d090;
  font-family: Georgia, serif;
  font-size: 15px;
  letter-spacing: 3px;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
  text-align: center;
}
.btn:hover { background: #2a2010; border-color: #9a7a30; }
.btn:disabled { opacity: 0.4; cursor: default; }
.btn.secondary { border-color: #3a2e1a; color: #7a6a4a; font-size: 13px; letter-spacing: 1px; margin-top: 10px; }

/* ===== HUD ===== */
#hud {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid #2a1e0a;
  margin-bottom: 20px;
}

.hud-year { font-size: 22px; color: #f0d090; letter-spacing: 4px; }
.hud-progress { font-size: 11px; color: #5a4a20; letter-spacing: 1px; }

.progress-bar {
  height: 2px;
  background: #2a1e0a;
  margin-bottom: 20px;
  border-radius: 1px;
}
.progress-fill {
  height: 100%;
  background: #7a5a20;
  border-radius: 1px;
  transition: width 0.5s ease;
}

/* ===== CURRENT CARD ===== */
.current-card-block { margin-bottom: 24px; }
.section-label {
  font-size: 11px;
  color: #5a4a20;
  letter-spacing: 3px;
  margin-bottom: 10px;
}

.card {
  border: 1px solid #3a2e1a;
  background: #111008;
  padding: 14px 16px;
  border-radius: 3px;
  position: relative;
  cursor: default;
  transition: all 0.3s;
}

.card.selectable { cursor: pointer; }
.card.selectable:hover { border-color: #7a5a20; background: #1a1608; }
.card.selected { border-color: #f0d090; background: #1a1608; }
.card.flipped-in { animation: flipIn 0.3s ease; }

@keyframes flipIn {
  from { transform: rotateY(90deg); opacity: 0; }
  to { transform: rotateY(0); opacity: 1; }
}

.card-face-down {
  border: 1px solid #2a1e0a;
  background: #0d0d0d;
  padding: 14px 16px;
  border-radius: 3px;
  height: 72px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #2a1e0a;
  font-size: 20px;
  letter-spacing: 4px;
}

.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 6px;
}

.card-name { font-size: 18px; color: #f0d090; }
.card-name.own-card::after { content: ' 本'; font-size: 10px; color: #7a5a20; vertical-align: super; }

.rarity {
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 2px;
  letter-spacing: 1px;
}
.rarity-N { background: #1a1a1a; color: #666; border: 1px solid #333; }
.rarity-R { background: #0d1a2e; color: #4a80c0; border: 1px solid #1a3a60; }
.rarity-SR { background: #1a0d2e; color: #9060c0; border: 1px solid #3a1a60; }
.rarity-SSR { background: #1a1400; color: #c09020; border: 1px solid #5a4400; }
.rarity-UR { background: #1a0000; color: #c04040; border: 1px solid #5a1010; }

.card-bottom {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}

.card-desc { font-size: 12px; color: #7a6a4a; line-height: 1.5; flex: 1; padding-right: 10px; }
.card-resist { font-size: 20px; color: #5a4a20; font-weight: bold; }
.card-resist span { font-size: 10px; color: #3a2e1a; }

.card.eliminated { border-color: #5a1010 !important; background: #100808 !important; }
.card.eliminated .card-name { color: #7a3030; text-decoration: line-through; }
.card.safe { border-color: #1a4a1a; }

/* ===== DRAW AREA ===== */
.draw-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 16px;
}

.draw-grid .card:nth-child(5) {
  grid-column: span 2;
}

/* ===== EVENT ===== */
#event-screen .event-year {
  font-size: 40px;
  color: #f0d090;
  letter-spacing: 8px;
  margin-bottom: 20px;
  text-align: center;
}

.event-text {
  font-size: 14px;
  line-height: 2;
  color: #c8b898;
  min-height: 80px;
  margin-bottom: 20px;
  padding: 16px;
  border: 1px solid #1a1408;
  background: #0a0a06;
  border-radius: 3px;
}

.event-slogan {
  font-size: 13px;
  color: #5a4a20;
  letter-spacing: 3px;
  text-align: right;
  margin-bottom: 24px;
}

/* ===== ELIMINATION ===== */
.elim-list { margin-bottom: 24px; }
.elim-item {
  padding: 10px 14px;
  border-left: 2px solid #5a1010;
  margin-bottom: 8px;
  font-size: 15px;
  color: #c85050;
  opacity: 0;
  transition: opacity 0.3s;
  background: #0d0806;
}
.elim-item.visible { opacity: 1; }
.elim-item.yours { border-color: #c85050; background: #1a0808; color: #e06060; font-size: 17px; }

.verdict-box {
  padding: 20px;
  text-align: center;
  border: 1px solid #3a2e1a;
  margin-bottom: 20px;
  border-radius: 3px;
}
.verdict-box.survived { border-color: #1a4a1a; background: #060d06; }
.verdict-box.eliminated { border-color: #5a1010; background: #0d0606; }
.verdict-title { font-size: 20px; margin-bottom: 8px; }
.survived .verdict-title { color: #60a060; }
.eliminated .verdict-title { color: #c85050; }
.verdict-sub { font-size: 13px; color: #5a4a4a; line-height: 1.8; }

/* ===== ENDING ===== */
#ending-screen { padding: 40px 0; }
.ending-title { font-size: 26px; color: #f0d090; letter-spacing: 4px; margin-bottom: 30px; text-align: center; }
.ending-text {
  font-size: 15px;
  line-height: 2.2;
  color: #c8b898;
  margin-bottom: 30px;
  padding: 0 4px;
}
.ending-text p { margin-bottom: 16px; }

/* ===== FAIL ===== */
#fail-screen { padding: 40px 0; }
.fail-year { font-size: 36px; color: #c85050; letter-spacing: 6px; margin-bottom: 16px; text-align: center; }
.fail-text {
  font-size: 14px;
  line-height: 2;
  color: #a08080;
  margin-bottom: 30px;
  padding: 16px;
  border: 1px solid #2a1010;
  background: #0a0606;
  border-radius: 3px;
}

/* ===== UTILS ===== */
.divider { border: none; border-top: 1px solid #1a1408; margin: 20px 0; }
</style>
</head>
<body>
<div id="app">

<!-- INTRO -->
<div id="intro-screen" class="screen active">
  <div id="intro">
    <div class="title-block">
      <div class="game-title">职业档案局</div>
      <div class="game-sub">2026年，AI开始重新定义「有用」</div>
    </div>
    <div class="intro-text">
      这是一个关于消失的游戏。<br>
      从2026年开始，每一年都有一些职业从世界上消失。<br>
      不是因为没人干，是因为AI干得比你好，还不需要休息。<br><br>
      你有一份工作。能活过十年吗？
    </div>
    <div class="input-block">
      <label>你现在的职业是</label>
      <input type="text" id="job-input" placeholder="例：编导、程序员、设计师……" maxlength="12">
      <button class="btn" id="start-btn">生成档案</button>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="game-screen" class="screen">
  <div id="hud">
    <div class="hud-year" id="hud-year">2026</div>
    <div class="hud-progress" id="hud-progress">第 1 年 / 共 10 年</div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

  <!-- Phase: Draw -->
  <div id="phase-draw">
    <div class="current-card-block">
      <div class="section-label">当前职业</div>
      <div class="card" id="current-card-display">
        <div class="card-top">
          <div class="card-name" id="cc-name"></div>
          <div class="rarity" id="cc-rarity"></div>
        </div>
        <div class="card-bottom">
          <div class="card-desc" id="cc-desc"></div>
          <div class="card-resist"><span>抗AI</span><br><span id="cc-resist"></span></div>
        </div>
      </div>
    </div>

    <div class="section-label">今年抽到的职业</div>
    <div class="draw-grid" id="draw-grid"></div>

    <button class="btn" id="keep-btn">保留当前职业，继续</button>
    <button class="btn secondary" id="back-to-own-btn" style="display:none">换回本职（<span id="own-job-name"></span>）</button>
  </div>

  <!-- Phase: Event -->
  <div id="phase-event" style="display:none">
    <div class="event-year" id="ev-year"></div>
    <div class="event-text" id="ev-text"></div>
    <div class="event-slogan" id="ev-slogan"></div>
    <button class="btn" id="event-next-btn">查看淘汰名单</button>
  </div>

  <!-- Phase: Elimination -->
  <div id="phase-elim" style="display:none">
    <div class="section-label" style="margin-bottom:16px">本年淘汰名单</div>
    <div class="elim-list" id="elim-list"></div>
    <div class="verdict-box" id="verdict-box" style="display:none">
      <div class="verdict-title" id="verdict-title"></div>
      <div class="verdict-sub" id="verdict-sub"></div>
    </div>
    <button class="btn" id="elim-next-btn" style="display:none">进入下一年</button>
  </div>
</div>

<!-- EVENT SCREEN (fullscreen) -->
<div id="event-screen" class="screen">
  <div style="padding-top: 60px;">
    <div class="event-year" id="fs-year"></div>
    <div class="event-text" id="fs-text"></div>
    <div class="event-slogan" id="fs-slogan"></div>
    <button class="btn" id="fs-next-btn">查看淘汰名单</button>
  </div>
</div>

<!-- FAIL -->
<div id="fail-screen" class="screen">
  <div class="fail-year" id="fail-year-text"></div>
  <div class="fail-text" id="fail-text"></div>
  <button class="btn" id="retry-btn">退回这一年，重新选择</button>
  <button class="btn secondary" id="restart-btn">重新开始</button>
</div>

<!-- ENDING -->
<div id="ending-screen" class="screen">
  <div class="ending-title">你活下来了。</div>
  <div class="ending-text" id="ending-text"></div>
  <button class="btn" id="play-again-btn">再玩一次</button>
</div>

</div>

  { name:"客服代表", rarity:"N", aiResist:12, desc:"接听投诉，解释政策，道歉。0.3秒内完成，且不会崩溃。" },
  { name:"导游", rarity:"R", aiResist:42, desc:"带人去没去过的地方，讲那里的故事。她不能被生成。" },
  { name:"心理咨询师", rarity:"SSR", aiResist:58, desc:"不评判，不建议，只是在那里。68%的人现在更愿意找AI。" },
  { name:"社工", rarity:"SR", aiResist:55, desc:"去那些没人想去的地方，陪那些没人陪的人。" },
  { name:"律师助理", rarity:"SR", aiResist:38, desc:"查案例，写摘要，整理证据。40分钟能做完她三天的工作量。" },
  { name:"数据分析师", rarity:"SR", aiResist:30, desc:"从数字里找规律。规律现在自己会找了。" },
  { name:"会计", rarity:"R", aiResist:22, desc:"让账对上。有东西比她对得更快，而且不会出错。" },
  { name:"工程师", rarity:"SSR", aiResist:62, desc:"把想法变成能运行的东西。目前还需要判断力，不只是算力。" },
  { name:"医疗助理", rarity:"R", aiResist:35, desc:"在医生和患者之间传递信息。两边都在被重新定义。" },
  { name:"基础程序员", rarity:"R", aiResist:28, desc:"写代码解决问题。AI写代码更快，还不需要解释。" },
  { name:"数据录入员", rarity:"N", aiResist:10, desc:"复制，粘贴，确认。这份工作的终点从一开始就写好了。" },
  { name:"非遗传承人", rarity:"UR", aiResist:95, desc:"有些东西一旦消失就没了。她的存在本身，就是在对抗遗忘。" },
  { name:"哲学教授", rarity:"UR", aiResist:90, desc:"问没有答案的问题。AI最擅长回答有答案的问题。" },
  { name:"殡葬师", rarity:"UR", aiResist:88, desc:"送人走的最后一程。这件事需要有人在场，真实地在场。" }
];

// ===== STATE =====
let state = {
  ownJob: '',
  ownCard: null,
  currentCard: null,
  yearIndex: 0,
  drawnCards: [],
  swappedThisYear: false,
  startOfYearCard: null,
  phase: 'draw' // draw | event | elim
};

// ===== HELPERS =====
function rarityClass(r) { return 'rarity-' + r; }
function rarityLabel(r) { return r; }

function isOwn(card) {
  return card && state.ownCard && card.name === state.ownCard.name && card.isOwn;
}

function cardHTML(card, selectable = false, selected = false) {
  const nameClass = card.isOwn ? 'card-name own-card' : 'card-name';
  const cardClass = ['card', selectable ? 'selectable' : '', selected ? 'selected' : ''].filter(Boolean).join(' ');
  return `<div class="${cardClass}">
    <div class="card-top">
      <div class="${nameClass}">${card.name}</div>
      <div class="rarity ${rarityClass(card.rarity)}">${rarityLabel(card.rarity)}</div>
    </div>
    <div class="card-bottom">
      <div class="card-desc">${card.desc}</div>
      <div class="card-resist"><span>抗AI</span><br>${card.aiResist}</div>
    </div>
  </div>`;
}

function getRandomCards(n, exclude = []) {
  const pool = CARD_POOL.filter(c => !exclude.includes(c.name));
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, n);
}

function updateHUD() {
  const y = YEARS[state.yearIndex];
  document.getElementById('hud-year').textContent = y.year;
  document.getElementById('hud-progress').textContent = `第 ${state.yearIndex + 1} 年 / 共 10 年`;
  document.getElementById('progress-fill').style.width = (state.yearIndex / 10 * 100) + '%';
}

function updateCurrentCardDisplay() {
  const c = state.currentCard;
  const el = document.getElementById('current-card-display');
  const nameEl = document.getElementById('cc-name');
  nameEl.textContent = c.name;
  nameEl.className = c.isOwn ? 'card-name own-card' : 'card-name';
  document.getElementById('cc-rarity').textContent = c.rarity;
  document.getElementById('cc-rarity').className = 'rarity ' + rarityClass(c.rarity);
  document.getElementById('cc-desc').textContent = c.desc;
  document.getElementById('cc-resist').textContent = c.aiResist;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== PHASES =====
function startYear() {
  state.swappedThisYear = false;
  state.startOfYearCard = {...state.currentCard};
  state.phase = 'draw';

  updateHUD();
  showScreen('game-screen');
  showPhase('draw');

  // Draw cards
  state.drawnCards = getRandomCards(5, [state.currentCard.name]);
  renderDrawPhase();
}

function showPhase(phase) {
  document.getElementById('phase-draw').style.display = phase === 'draw' ? 'block' : 'none';
  document.getElementById('phase-event').style.display = phase === 'event' ? 'block' : 'none';
  document.getElementById('phase-elim').style.display = phase === 'elim' ? 'block' : 'none';
}

function renderDrawPhase() {
  updateCurrentCardDisplay();

  const grid = document.getElementById('draw-grid');
  grid.innerHTML = '';

  // Show face-down cards, then flip
  state.drawnCards.forEach((card, i) => {
    const div = document.createElement('div');
    div.className = 'card-face-down';
    div.innerHTML = '◆';
    if (i === 4) div.style.gridColumn = 'span 2';
    grid.appendChild(div);
  });

  // Flip one by one
  state.drawnCards.forEach((card, i) => {
    setTimeout(() => {
      const children = grid.children;
      if (children[i]) {
        children[i].outerHTML = makeDrawCardHTML(card, i);
        // Re-attach listener
        const newCard = grid.children[i];
        if (newCard) {
          newCard.addEventListener('click', () => onDrawCardClick(i));
        }
      }
    }, 400 * (i + 1));
  });

  // Show back-to-own button if not currently on own card
  const backBtn = document.getElementById('back-to-own-btn');
  if (!state.currentCard.isOwn) {
    backBtn.style.display = 'block';
    document.getElementById('own-job-name').textContent = state.ownCard.name;
  } else {
    backBtn.style.display = 'none';
  }

  document.getElementById('keep-btn').disabled = false;
}

function makeDrawCardHTML(card, index) {
  const gridSpan = index === 4 ? ' style="grid-column:span 2"' : '';
  return `<div class="card selectable" data-index="${index}"${gridSpan}>
    <div class="card-top">
      <div class="card-name">${card.name}</div>
      <div class="rarity ${rarityClass(card.rarity)}">${card.rarity}</div>
    </div>
    <div class="card-bottom">
      <div class="card-desc">${card.desc}</div>
      <div class="card-resist"><span>抗AI</span><br>${card.aiResist}</div>
    </div>
  </div>`;
}

function onDrawCardClick(i) {
  if (state.swappedThisYear) return;
  const chosen = state.drawnCards[i];
  state.currentCard = {...chosen, isOwn: false};
  state.swappedThisYear = true;
  updateCurrentCardDisplay();

  // Highlight selected
  const grid = document.getElementById('draw-grid');
  Array.from(grid.children).forEach((el, idx) => {
    el.classList.toggle('selected', idx === i);
    el.classList.remove('selectable');
  });

  // Change keep button text
  document.getElementById('keep-btn').textContent = '确认换职，继续';
}

function proceedToEvent() {
  const y = YEARS[state.yearIndex];
  document.getElementById('ev-year').textContent = y.year;
  document.getElementById('ev-text').textContent = '';
  document.getElementById('ev-slogan').textContent = '';

  showPhase('event');

  // Typewriter effect
  let i = 0;
  const text = y.event;
  const el = document.getElementById('ev-text');
  const timer = setInterval(() => {
    el.textContent += text[i];
    i++;
    if (i >= text.length) {
      clearInterval(timer);
      document.getElementById('ev-slogan').textContent = '— ' + y.slogan;
    }
  }, 18);
}

function proceedToElim() {
  const y = YEARS[state.yearIndex];
  const list = document.getElementById('elim-list');
  list.innerHTML = '';
  document.getElementById('verdict-box').style.display = 'none';
  document.getElementById('elim-next-btn').style.display = 'none';

  showPhase('elim');

  y.eliminated.forEach((job, i) => {
    const div = document.createElement('div');
    const isYours = job === state.currentCard.name;
    div.className = 'elim-item' + (isYours ? ' yours' : '');
    div.textContent = (isYours ? '▶ ' : '') + job + (isYours ? '（你的职业）' : '');
    list.appendChild(div);

    setTimeout(() => {
      div.classList.add('visible');
      if (i === y.eliminated.length - 1) {
        setTimeout(() => showVerdict(y), 600);
      }
    }, 500 * (i + 1));
  });
}

function showVerdict(y) {
  const eliminated = y.eliminated.includes(state.currentCard.name);
  const box = document.getElementById('verdict-box');
  box.style.display = 'block';

  if (eliminated) {
    box.className = 'verdict-box eliminated';
    document.getElementById('verdict-title').textContent = state.currentCard.name + ' · 已淘汰';
    document.getElementById('verdict-sub').textContent = `${y.year}年，你失业了。`;
    document.getElementById('elim-next-btn').style.display = 'none';
    setTimeout(() => showFail(y), 1200);
  } else {
    box.className = 'verdict-box survived';
    document.getElementById('verdict-title').textContent = '幸存';
    const remaining = 10 - state.yearIndex - 1;
    if (remaining > 0) {
      document.getElementById('verdict-sub').textContent = `${state.currentCard.name} 这一年没有被淘汰。还有 ${remaining} 年。`;
    } else {
      document.getElementById('verdict-sub').textContent = `${state.currentCard.name} 活过了2035年。`;
    }
    const nextBtn = document.getElementById('elim-next-btn');
    nextBtn.style.display = 'block';
    if (state.yearIndex >= 9) {
      nextBtn.textContent = '查看结局';
    } else {
      nextBtn.textContent = '进入下一年 →';
    }
  }
}

function showFail(y) {
  showScreen('fail-screen');
  document.getElementById('fail-year-text').textContent = y.year + '年';
  document.getElementById('fail-text').textContent =
    `${y.year}年。${y.event.split('。')[0]}。\n\n你持有的「${state.currentCard.name}」在这一年进入了淘汰名单。\n\n不是你的错。只是时代的滚轮，刚好从你这里压过去了。`;
}

function showEnding() {
  showScreen('ending-screen');
  const usedOwnCard = state.currentCard.isOwn;
  let text = '';
  if (usedOwnCard) {
    text = `<p>十年。</p>
<p>你从2026年开始，就带着「${state.ownCard.name}」这张卡，一路走到了2035年。</p>
<p>你看着身边的人一个一个离开，看着那些职业的名字从档案里消失。但你还在，做着你一开始做的那件事。</p>
<p>不是因为你比别人聪明，也不是因为你的职业更安全。</p>
<p>是因为你一直在翻这副牌。一直想知道，还有哪张没有。</p>
<p>你知道这没什么用。但你就是想知道。</p>
<p>这件事，AI不懂。</p>`;
  } else {
    text = `<p>十年。</p>
<p>你从「${state.ownCard.name}」出发，在这十年里换了身份，最终以「${state.currentCard.name}」活到了2035年。</p>
<p>你看着身边的人一个一个离开。有几年你也差一点。</p>
<p>但你换了方向。你还在。</p>
<p>不是因为你逃得快，是因为你一直在看那些消失的名字，一直在想下一步。</p>
<p>这件事，AI不懂。</p>`;
  }
  document.getElementById('ending-text').innerHTML = text;
}

// ===== EVENT LISTENERS =====
document.getElementById('start-btn').addEventListener('click', () => {
  const job = document.getElementById('job-input').value.trim();
  if (!job) { document.getElementById('job-input').focus(); return; }

  state.ownJob = job;
  state.ownCard = {
    name: job,
    rarity: 'N',
    aiResist: Math.floor(Math.random() * 25) + 60,
    desc: '这是你现在的职业。',
    isOwn: true
  };
  state.currentCard = {...state.ownCard};
  state.yearIndex = 0;

  startYear();
});

document.getElementById('keep-btn').addEventListener('click', () => {
  proceedToEvent();
});

document.getElementById('back-to-own-btn').addEventListener('click', () => {
  if (state.swappedThisYear) return;
  state.currentCard = {...state.ownCard, isOwn: true};
  state.swappedThisYear = true;
  updateCurrentCardDisplay();
  document.getElementById('keep-btn').textContent = '确认换回本职，继续';

  const grid = document.getElementById('draw-grid');
  Array.from(grid.children).forEach(el => {
    el.classList.remove('selectable', 'selected');
  });
});

document.getElementById('event-next-btn').addEventListener('click', () => {
  proceedToElim();
});

document.getElementById('elim-next-btn').addEventListener('click', () => {
  if (state.yearIndex >= 9) {
    showEnding();
  } else {
    state.yearIndex++;
    startYear();
  }
});

document.getElementById('retry-btn').addEventListener('click', () => {
  // Roll back: restore card from start of that year
  state.currentCard = {...state.startOfYearCard};
  startYear();
});

document.getElementById('restart-btn').addEventListener('click', () => {
  state = { ownJob:'', ownCard:null, currentCard:null, yearIndex:0, drawnCards:[], swappedThisYear:false, startOfYearCard:null, phase:'draw' };
  document.getElementById('job-input').value = '';
  document.getElementById('keep-btn').textContent = '保留当前职业，继续';
  showScreen('intro-screen');
});

document.getElementById('play-again-btn').addEventListener('click', () => {
  state.yearIndex = 0;
  state.currentCard = {...state.ownCard};
  document.getElementById('keep-btn').textContent = '保留当前职业，继续';
  startYear();
});

// Draw grid click delegation
document.getElementById('draw-grid').addEventListener('click', (e) => {
  const card = e.target.closest('.card.selectable');
  if (!card) return;
  const index = parseInt(card.dataset.index);
  if (!isNaN(index)) onDrawCardClick(index);
});
</script>
</body>
</html>
